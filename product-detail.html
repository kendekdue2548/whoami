<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดสินค้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nav-style.css">
    <style>
        /* Match main site theme: Modern Earth & Minimal */
        :root {
            --primary: #8D7B68;
            --secondary: #C8B6A6;
            --accent: #A4907C;
            --dark: #2C2C2C;
            --light: #FAF9F6;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { background: var(--light); color: var(--dark); font-family: 'Kanit', sans-serif; min-height: 100vh; }

        .detail-container { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }

        /* Back button */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #fff; color: #666; text-decoration: none;
            padding: 10px 18px; border-radius: 30px; font-size: 0.85rem;
            margin-bottom: 30px; border: 1px solid #e0d8d0; transition: 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .back-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Product Layout */
        .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
        @media(max-width: 768px) { .product-layout { grid-template-columns: 1fr; } }

        /* === Image Section === */
        .image-section { position: sticky; top: 20px; }

        /* Main Image */
        .main-image-wrap {
            width: 100%; aspect-ratio: 1;
            border-radius: 16px; overflow: hidden;
            background: #f0ede8; border: 1px solid #e0d8d0; margin-bottom: 12px;
            cursor: zoom-in; position: relative;
        }
        .main-image-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }
        .main-image-wrap:hover img { transform: scale(1.04); }

        /* Thumbnail Strip */
        .thumb-strip {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .thumb-item {
            width: 70px; height: 70px; border-radius: 10px; overflow: hidden;
            border: 2px solid transparent; cursor: pointer; transition: 0.2s;
            background: #f0ede8; flex-shrink: 0;
        }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-item.active { border-color: var(--primary); }
        .thumb-item:hover { border-color: var(--secondary); }

        /* No extra images message */
        .no-gallery { color: #aaa; font-size: 0.8rem; text-align: center; padding: 10px; }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out;
        }
        #lightbox.show { display: flex; }
        #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; object-fit: contain; }
        #lightbox .lb-close {
            position: absolute; top: 20px; right: 24px; font-size: 2rem;
            color: #fff; cursor: pointer; line-height: 1;
        }
        #lightbox .lb-prev, #lightbox .lb-next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            font-size: 1.5rem; padding: 12px 16px; cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        #lightbox .lb-prev:hover, #lightbox .lb-next:hover { background: rgba(141,123,104,0.6); }
        #lightbox .lb-prev { left: 16px; }
        #lightbox .lb-next { right: 16px; }

        /* === Info Section === */
        .info-section { padding: 10px 0; }
        .product-title { font-size: 1.8rem; font-weight: 600; color: var(--dark); margin-bottom: 8px; line-height: 1.3; }
        .product-category {
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: #999; display: block; margin-bottom: 10px;
        }
        /* Price row */
        .price-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
        .price-now { font-size: 2rem; font-weight: 700; color: var(--dark); }
        .price-old { font-size: 1.1rem; color: #bbb; text-decoration: line-through; }

        .product-desc { color: #666; font-size: 0.95rem; line-height: 1.8; margin-bottom: 20px; white-space: pre-line; }

        /* Color picker */
        .option-label { font-size: 0.9rem; color: var(--dark); font-weight: 500; margin-bottom: 10px; }
        .color-swatches { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .color-dot {
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .color-dot.selected { border-color: var(--dark); transform: scale(1.15); }
        .color-dot:hover { transform: scale(1.1); }

        .divider { border: none; border-top: 1px solid #e8e2da; margin: 18px 0; }

        /* Cart button */
        .cart-btn {
            display: block; width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: #F6A623; color: #fff;
            font-size: 1.1rem; font-weight: 600; font-family: 'Kanit', sans-serif;
            cursor: pointer; text-align: center; text-decoration: none; transition: 0.3s;
            margin-bottom: 12px;
        }
        .cart-btn:hover { background: #e09510; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(246,166,35,0.35); }

        /* Badges */
        .badge-row { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .badge-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #555; }
        .badge-item i { color: #4caf50; font-size: 1rem; }
        .badge-item i.truck { color: var(--primary); }

        .loading-card { text-align: center; padding: 80px 20px; color: #aaa; }
        .loading-card i { font-size: 3rem; margin-bottom: 16px; display: block; color: var(--secondary); }
</style>
</head>
<body>

<script src="nav-script.js"></script>

<div class="detail-container">
    <a class="back-btn" id="backBtn" href="#"><i class="fas fa-arrow-left"></i> ย้อนกลับ</a>

    <div id="productContent">
        <div class="loading-card">
            <i class="fas fa-spinner fa-spin" style="color: #ff00ff;"></i>
            <p>กำลังโหลดข้อมูลสินค้า...</p>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
    <span class="lb-close" onclick="closeLightboxDirect()"><i class="fas fa-times"></i></span>
    <button class="lb-prev" onclick="lbNav(-1); event.stopPropagation();"><i class="fas fa-chevron-left"></i></button>
    <img id="lbImg" src="" alt="">
    <button class="lb-next" onclick="lbNav(1); event.stopPropagation();"><i class="fas fa-chevron-right"></i></button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDFdgBMHIPgNGWhwR7gs1arC1lJbVYNr3k",
        authDomain: "mesofa-admin.firebaseapp.com",
        databaseURL: "https://mesofa-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mesofa-admin",
        storageBucket: "mesofa-admin.firebasestorage.app",
        messagingSenderId: "758172615910",
        appId: "1:758172615910:web:920af81b94c1b4b071e727"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Back button: use ?from= param or history
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const fromPage = urlParams.get('from');

    const backBtn = document.getElementById('backBtn');
    if (fromPage) {
        backBtn.href = fromPage + '.html';
    } else {
        backBtn.href = 'javascript:history.back()';
    }

    // All images for lightbox
    let allImages = [];
    let lbIndex = 0;
    let currentMainIdx = 0;

    function setMainImage(idx) {
        currentMainIdx = idx;
        document.getElementById('mainImg').src = allImages[idx];
        document.querySelectorAll('.thumb-item').forEach((t, i) => {
            t.classList.toggle('active', i === idx);
        });
    }

    function openLightbox(idx) {
        lbIndex = idx;
        document.getElementById('lbImg').src = allImages[lbIndex];
        document.getElementById('lightbox').classList.add('show');
        // hide nav if only 1 image
        document.querySelector('.lb-prev').style.display = allImages.length > 1 ? '' : 'none';
        document.querySelector('.lb-next').style.display = allImages.length > 1 ? '' : 'none';
    }

    function closeLightbox(e) {
        if (e.target === document.getElementById('lightbox') || e.target === document.getElementById('lbImg')) {
            closeLightboxDirect();
        }
    }
    function closeLightboxDirect() {
        document.getElementById('lightbox').classList.remove('show');
    }

    function lbNav(dir) {
        lbIndex = (lbIndex + dir + allImages.length) % allImages.length;
        document.getElementById('lbImg').src = allImages[lbIndex];
    }

    function selectColor(el) {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
    }

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('show')) return;
        if (e.key === 'Escape') closeLightboxDirect();
        if (e.key === 'ArrowLeft') lbNav(-1);
        if (e.key === 'ArrowRight') lbNav(1);
    });

    if (!productId) {
        document.getElementById('productContent').innerHTML = `<div class="loading-card"><i class="fas fa-exclamation-triangle" style="color:#f44336;"></i><p>ไม่พบสินค้า กรุณากลับหน้าหมวดหมู่</p></div>`;
    } else {
        db.ref('products/' + productId).once('value', (snap) => {
            if (!snap.exists()) {
                document.getElementById('productContent').innerHTML = `<div class="loading-card"><i class="fas fa-box-open" style="color:#888;"></i><p>ไม่พบสินค้านี้</p></div>`;
                return;
            }
            const p = snap.val();

            // Build allImages: cover + gallery
            allImages = [p.image];
            if (p.images && p.images.length) {
                allImages = allImages.concat(p.images);
            }

            // Build thumbnails HTML
            const thumbsHTML = allImages.length > 1
                ? `<div class="thumb-strip">
                    ${allImages.map((img, i) => `
                        <div class="thumb-item ${i === 0 ? 'active' : ''}" onclick="setMainImage(${i})">
                            <img src="${img}" alt="รูป ${i+1}">
                        </div>
                    `).join('')}
                   </div>`
                : `<p class="no-gallery"><i class="fas fa-images"></i> ไม่มีรูปเพิ่มเติม</p>`;

            // Build color swatches HTML
            let colorsHTML = '';
            if (p.colors && p.colors.length) {
                const swatches = p.colors.map((c, i) =>
                    `<div class="color-dot ${i===0?'selected':''}" style="background:${c};" title="${c}" onclick="selectColor(this)"></div>`
                ).join('');
                colorsHTML = `<p class="option-label">เลือกสีผ้า:</p><div class="color-swatches">${swatches}</div>`;
            }

            // Build price HTML
            const priceNow = `฿${Number(p.price).toLocaleString()}`;
            const priceOld = p.comparePrice ? `<span class="price-old">฿${Number(p.comparePrice).toLocaleString()}</span>` : '';
            const catLabelMap = { 'living-room': 'LIVING ROOM COLLECTION', 'bedroom': 'BEDROOM COLLECTION', 'dining-room': 'DINING ROOM COLLECTION', 'office': 'OFFICE COLLECTION' };

            document.getElementById('productContent').innerHTML = `
                <div class="product-layout">
                    <div class="image-section">
                        <div class="main-image-wrap" onclick="openLightbox(currentMainIdx)">
                            <img id="mainImg" src="${p.image}" alt="${p.name}">
                        </div>
                        ${thumbsHTML}
                    </div>
                    <div class="info-section">
                        <span class="product-category">${catLabelMap[p.category] || p.category}</span>
                        <h1 class="product-title">${p.name}</h1>
                        <div class="price-row">
                            <span class="price-now">${priceNow}</span>
                            ${priceOld}
                        </div>
                        ${colorsHTML}
                        ${p.description ? `<p class="product-desc">${p.description}</p>` : ''}
                        <hr class="divider">
                        <button class="cart-btn" onclick="alert('ติดต่อเราได้ที่ LINE: @mesofa')">
                            <i class="fas fa-shopping-cart"></i> เพิ่มไปยังรถเข็น
                        </button>
                        <div class="badge-row">
                            <div class="badge-item"><i class="fas fa-check-circle"></i> สินค้าสั่งทำพิเศษ (Custom Made)</div>
                            <div class="badge-item"><i class="fas fa-truck truck"></i> จัดส่งและติดตั้งฟรี กทม. และปริมณฑล</div>
                        </div>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
